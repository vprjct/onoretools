<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カウンターサイト</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    .item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .label {
      width: 80px;
      font-weight: bold;
    }
    .counter {
      margin: 0 10px;
      font-size: 1.2em;
      width: 40px;
      text-align: center;
    }
    button {
      width: 30px;
      height: 30px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="item">
    <span class="label">ソルジャー</span>
    <button onclick="changeValue('soldier', 1)">▲</button>
    <span id="soldier" class="counter">0</span>
    <button onclick="changeValue('soldier', -1)">▼</button>
  </div>

  <div class="item">
    <span class="label">アーマー</span>
    <button onclick="changeValue('armor', 1)">▲</button>
    <span id="armor" class="counter">0</span>
    <button onclick="changeValue('armor', -1)">▼</button>
  </div>

  <script>
    function changeValue(id, delta) {
      const counter = document.getElementById(id);
      let value = parseInt(counter.textContent);
      value += delta;
      counter.textContent = value;
    }
  </script>
</body>
</html>
