<!-- ===================== -->
<!-- 2カラムレイアウト -->
<!-- ===================== -->
<div class="facility-page-layout">

    <!-- ── サイドバー ── -->
    <aside class="facility-sidebar">

        <!-- 都市選択 -->
        <div>
            <div class="facility-section-label">都市選択</div>
            <select id="citySelect"></select>
        </div>

        <!-- フィルタ -->
        <div>
            <div class="facility-section-label">カテゴリフィルタ</div>
            <div id="facilityFilter">
                <label><input type="checkbox" value="徴兵" checked> 徴兵</label>
                <label><input type="checkbox" value="収入" checked> 収入</label>
                <label><input type="checkbox" value="その他" checked> その他</label>
                <label><input type="checkbox" value="固有" checked> 文明・都市固有</label>
            </div>
        </div>


        <!-- 現在構成プレビュー -->
        <div>
            <div class="facility-section-label">現在の構成</div>
            <div id="currentResult"></div>
            <button id="addPatternBtn" style="margin-top:12px; width:100%;">＋ 比較に追加</button>
        </div>

    </aside>

    <!-- ── メインエリア ── -->
    <main class="facility-main">

        <!-- 施設選択 -->
        <section>
            <div class="facility-section-header">
                <h2>施設選択（<span id="selectedCount">0</span> / 6）</h2>
                <div id="sizeStatusBar" class="size-status-bar">— / —</div>
                <div id="sizeWarning" class="warning"></div>
            </div>
            <div id="facilitySelectContainer"></div>
        </section>

        <!-- 比較結果 -->
        <section>
            <h2>比較結果</h2>
            <div style="overflow-x:auto;">
                <table id="comparisonTable"></table>
            </div>
        </section>

    </main>
</div>
