  <span class="header-meta">国宝チェッカー</span>

<div class="checker-layout">

  <div class="page-title">
    <h2>国宝チェッカー</h2>
    <p>国宝の所持状況を管理</p>
  </div>

  <!-- 入力エリア -->
  <div class="checker-input-card">
    <div class="checker-input-label">所持国宝を貼り付け（カンマ区切り）</div>
    <textarea id="ownedInput" placeholder="武家町設計図,牧場設計図,門前町設計図,忍の里設計図"></textarea>
    <div class="checker-input-actions">
      <button class="run-btn" onclick="applyOwned()">✅ 反映する</button>
      <button class="clear-btn" onclick="clearOwned()">クリア</button>
      <span class="checker-stats" id="checkerStats"></span>
    </div>
  </div>

  <!-- 検索 -->
  <div class="checker-search-bar">
    <input type="text" id="searchInput" placeholder="🔍 アイテム名・効果で検索..." oninput="renderItems()">
  </div>

  <!-- アイテムグリッド -->
  <div id="itemGrid" class="item-grid"></div>

</div>
