<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更新時間確認くん — ポメラニアンメニュー</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Page Layout ── */
    .updatetime-layout {
      max-width: 1000px;
      margin: 0 auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Page Title ── */
    .page-title {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .page-title h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-bright);
    }

    .page-title p {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ── Textarea Row ── */
    .textarea-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .textarea-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .textarea-group label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .textarea-group textarea {
      height: 400px;
      resize: vertical;
      font-size: 11px;
    }

    /* ── Controls ── */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .controls-row label {
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .font-size-control {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .font-size-control span {
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .font-size-control input[type="range"] {
      width: 100px;
      accent-color: var(--accent3);
      cursor: pointer;
    }

    .font-size-value {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--accent3);
      min-width: 32px;
    }

    /* ── Footer ── */
    .page-footer {
      text-align: center;
      padding: 20px 0 8px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .page-footer a {
      color: var(--text-dim);
    }

    .page-footer a:hover {
      color: var(--accent3);
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .updatetime-layout { padding: 20px 16px; }
      .textarea-row { grid-template-columns: 1fr; }
      .page-title { flex-direction: column; gap: 4px; }
      .font-size-control { margin-left: 0; }
    }
  </style>
</head>
<body>

<!-- ナビゲーション -->
<header>
  <a class="header-brand" href="index.html">
    <div class="logo-icon">🕐</div>
    <h1>ポメラニアン・変ツー</h1>
  </a>
  <nav class="header-nav">
    <li class="dropdown" style="list-style:none;">
      <a href="#">変なツール郡</a>
      <ul class="submenu">
        <li><a href="updatetime.html" class="active">更新時間確認くん</a></li>
        <li><a href="facility.html">建設シミュ</a></li>
        <li><a href="battlelog.html">戦闘ログ分析</a></li>
        <li><a href="classify.html">武将タイプ分類</a></li>
        <li><a href="treasure.html">国宝チェッカー</a></li>
      </ul>
    </li>
    <a href="https://onore.servegame.com/game/sangoku/index.cgi" target="_blank">己鯖</a>
    <a href="https://x.com/vprjct" target="_blank">連絡先</a>
  </nav>
  <span class="header-meta">更新時間確認くん</span>
</header>

<!-- メインコンテンツ -->
<div class="updatetime-layout">

  <!-- タイトル -->
  <div class="page-title">
    <h2>更新時間確認くん</h2>
    <p>登用・移動・競売（・品物売買）を10分換算してコマンド実行時間に反映するツール</p>
  </div>

  <!-- テキストエリア -->
  <div class="textarea-row">
    <div class="textarea-group">
      <label>コマンドリスト</label>
      <textarea id="inputText" placeholder="コマンドリストからコピペ" oninput="parseInput()"></textarea>
    </div>
    <div class="textarea-group">
      <label>変換後</label>
      <textarea id="outputText" readonly></textarea>
    </div>
  </div>

  <!-- コントロール -->
  <div class="controls-row">
    <label>
      <input type="checkbox" id="time-decrement" onchange="parseInput()">
      職人町が存在する
    </label>

    <div class="font-size-control">
      <span>フォントサイズ</span>
      <input type="range" id="font-size-range" min="6" max="36" value="11" step="1" oninput="adjustFontSize()">
      <span class="font-size-value" id="font-size-value">11px</span>
    </div>
  </div>



</div>

<script src="js/updatetime.js"></script>

<footer class="site-footer">
  <p>ポメラニアン・変ツー &nbsp;|&nbsp; This site is open source. <a href="https://github.com/vprjct/onoretools" target="_blank">Improve this page.</a></p>
</footer>
</body>
</html>
